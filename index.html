<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Q4 Skill Test</title>
    <style>

    </style>
</head>
<body>
    <div class="container mt-5 text-center">
    <div class="container mt-5">
         <h2 class="text-center">Login</h2>
    </div>

    <div class="mb-3 text-center">
        <img src="https://via.placeholder.com/80x80.png?text=Logo" alt="Logo" class="img-thumbnail mb-3" style="width:80px; height:80px;">
    </div>

    <form>
        <div class="mb-3">
            <label for="username" class="form-label">Username</label>
            <input type="text" class="form-control" id="username" placeholder="Enter here">
        </div>

        <div class="mb-3">
            <label for="password" class="form-label">Password</label>
            <input type="password" class="form-control" id="password" placeholder="Enter here">
        </div>

        <div class="form-check form-switch mb-3">
            <input class="form-check-input" type="checkbox" id="stayLoggedIn">
            <label class="form-check-label" for="stayLoggedIn">
                Stay logged in <br>
            </label>
        </div>

        <div class="d-flex justify-content-between mb-3">
            <button type="submit" class="btn btn-primary">Login</button>
            <button type="reset" class="btn btn-secondary">Cancel</button>
        </div>

         <div class="text-center">
            <a href="#" class="text-decoration-none">Forgot username / password?</a>
         </div>
         </div>
    </form>
</body>
</html>
